services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.production
    environment:
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-finopenpos}
      - PORT=3111
    ports:
      - "3111:3111"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pg_data:
