name: No AI co-author

# Reprova qualquer PR cujos commits tragam Co-Authored-By de Claude/Anthropic
# ou autor/committer com e-mail @anthropic.com. Required check no ruleset da
# master: sem passar aqui, não entra.
on:
  pull_request:

jobs:
  scan:
    name: No AI co-author
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Scan commits for AI co-author trailers
        run: |
          base='${{ github.event.pull_request.base.sha }}'
          head='${{ github.event.pull_request.head.sha }}'
          bad=$(git log --format='%H%x09%an <%ae>%x09%cn <%ce>%x09%(trailers:key=Co-Authored-By,valueonly,separator=%x2C)' "$base..$head" \
            | grep -iE 'claude|anthropic' || true)
          if [ -n "$bad" ]; then
            echo "::error::Commits com co-autoria/autoria de IA detectados:"
            echo "$bad"
            echo "Remova os trailers (git rebase + git commit --amend) antes do merge."
            exit 1
          fi
          echo "Nenhum trailer de IA nos $(git rev-list --count "$base..$head") commits."
