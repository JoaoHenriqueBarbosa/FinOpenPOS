name: Bug Report
description: Report a bug in FinOpenPOS
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - POS (apps/web)
        - Fiscal engine (packages/fiscal)
        - Database (packages/db)
        - UI components (packages/ui)
        - Docs (apps/docs)
        - Other

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Logs, screenshots, browser info, etc.
