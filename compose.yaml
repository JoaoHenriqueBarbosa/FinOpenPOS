services:
  app:
    build: .
    environment:
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BASE_URL=${BASE_URL:-http://localhost}
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-http://localhost}
      - PORT=3111
    ports:
      - "3111:3111"
    volumes:
      - pglite_data:/app/apps/web/data/pglite
    restart: unless-stopped

volumes:
  pglite_data:
